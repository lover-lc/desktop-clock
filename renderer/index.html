<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop Clock</title>
    <link rel="stylesheet" href="vendor/flipclock.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: fit-content;
        height: fit-content;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }

      #app {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 8px;
        cursor: default;
      }

      #date {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        font-size: 1.25rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.88);
        letter-spacing: 0.04em;
        text-align: center;
      }

      #countdown {
        display: none;
      }

      #countdown.visible {
        display: block;
      }

      #countdown .flipclock-theme {
        font-size: 2rem !important;
      }

      #toast {
        display: none;
        align-items: center;
        gap: 12px;
        width: max-content;
        max-width: 420px;
        margin-top: 4px;
        padding: 10px 12px;
        border-radius: 8px;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        font-size: 0.875rem;
        line-height: 1.4;
        color: #fff;
        background: rgba(30, 30, 30, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: none;
        white-space: nowrap;
      }

      #toast.visible {
        display: inline-flex;
      }

      #toast-message {
        flex: 1;
        min-width: 0;
      }

      #toast-close {
        flex-shrink: 0;
        display: none;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.92);
        cursor: pointer;
        font-size: 18px;
        font-weight: 600;
        line-height: 1;
      }

      #toast.persistent #toast-close {
        display: inline-flex;
      }

      #toast-close:hover {
        background: rgba(255, 255, 255, 0.18);
        border-color: rgba(255, 255, 255, 0.35);
      }

      #toast[data-type='success'] {
        border-color: rgba(72, 187, 120, 0.55);
      }

      #toast[data-type='error'] {
        border-color: rgba(245, 101, 101, 0.55);
      }

      #toast[data-type='info'] {
        border-color: rgba(99, 179, 237, 0.55);
      }

      #toast[data-type='countdown-end'] {
        background: rgba(30, 30, 30, 0.95);
        border: 1px solid rgba(230, 126, 34, 0.75);
        box-shadow: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="clock"></div>
      <div id="date"></div>
      <div id="countdown"><div id="countdown-clock"></div></div>
      <div id="toast" aria-live="polite">
        <span id="toast-message"></span>
        <button id="toast-close" type="button" aria-label="关闭">×</button>
      </div>
    </div>

    <script src="vendor/FlipClock.umd.js"></script>
    <script>
      const { flipClock, clock, elapsedTime, add, theme, css } = FlipClock;

      const WEEKDAYS = [
        '星期日',
        '星期一',
        '星期二',
        '星期三',
        '星期四',
        '星期五',
        '星期六',
      ];

      let toastTimer = null;
      let countdownInstance = null;
      let dragging = false;

      function getTimeFormat(use24Hour) {
        return use24Hour ? '[HH]:[mm]:[ss]' : '[hh]:[mm]:[ss][A]';
      }

      function formatDate(date) {
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        const day = date.getDate();
        const weekday = WEEKDAYS[date.getDay()];
        return `${year}年${month}月${day}日 ${weekday}`;
      }

      function updateDate() {
        document.getElementById('date').textContent = formatDate(new Date());
      }

      function scheduleFitWindow() {
        requestAnimationFrame(() => {
          window.desktopClock.fitWindow().catch(() => {});
        });
      }

      function setupWindowDrag() {
        const appEl = document.getElementById('app');

        appEl.addEventListener('mousedown', (event) => {
          if (event.button !== 0) return;
          if (event.target.closest('#toast-close')) return;
          dragging = true;
          window.desktopClock.startWindowDrag();
        });

        window.addEventListener('mousemove', (event) => {
          if (!dragging) return;
          window.desktopClock.dragWindow(event.screenX, event.screenY);
        });

        window.addEventListener('mouseup', () => {
          if (!dragging) return;
          dragging = false;
          window.desktopClock.endWindowDrag();
        });
      }

      function createClock(use24Hour) {
        const parent = document.querySelector('#clock');
        parent.innerHTML = '';

        flipClock({
          parent,
          face: clock({
            format: getTimeFormat(use24Hour),
          }),
          theme: theme({
            dividers: ':',
            css: css({
              fontSize: '3rem',
            }),
          }),
        });

        scheduleFitWindow();
      }

      function destroyCountdownClock() {
        if (countdownInstance) {
          countdownInstance.stop();
          countdownInstance.unmount();
          countdownInstance = null;
        }
        document.getElementById('countdown-clock').innerHTML = '';
      }

      function hideCountdown() {
        destroyCountdownClock();
        document.getElementById('countdown').classList.remove('visible');
        scheduleFitWindow();
      }

      function startCountdown({ hours, minutes, seconds }) {
        destroyCountdownClock();

        const endTime = add(new Date(), {
          hours,
          minutes,
          seconds,
        });

        document.getElementById('countdown').classList.add('visible');

        countdownInstance = flipClock({
          parent: document.getElementById('countdown-clock'),
          face: elapsedTime({
            from: endTime,
            to: new Date(),
            format: '[hh]:[mm]:[ss]',
          }),
          theme: theme({
            dividers: ':',
            css: css({
              fontSize: '2rem',
            }),
          }),
        });

        countdownInstance.start();
        scheduleFitWindow();
      }

      function playReminderSound() {
        try {
          const ctx = new AudioContext();
          const oscillator = ctx.createOscillator();
          const gain = ctx.createGain();
          oscillator.type = 'sine';
          oscillator.frequency.value = 880;
          gain.gain.value = 0.08;
          oscillator.connect(gain);
          gain.connect(ctx.destination);
          oscillator.start();
          setTimeout(() => {
            oscillator.stop();
            ctx.close();
          }, 280);
        } catch {
          // Ignore audio failures.
        }
      }

      function hideToast() {
        const toast = document.getElementById('toast');
        toast.classList.remove('visible', 'persistent');
        clearTimeout(toastTimer);
        scheduleFitWindow();
      }

      function showToast(message, type = 'info', persistent = false) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-message').textContent = message;
        toast.dataset.type = type;
        toast.classList.toggle('persistent', persistent);
        toast.classList.add('visible');
        clearTimeout(toastTimer);

        if (!persistent) {
          toastTimer = setTimeout(hideToast, 3000);
        }

        scheduleFitWindow();
      }

      async function init() {
        updateDate();
        setInterval(updateDate, 1000);
        setupWindowDrag();

        document.getElementById('toast-close').addEventListener('click', hideToast);

        const use24Hour = await window.desktopClock.getTimeFormat();
        createClock(use24Hour);

        window.desktopClock.onTimeFormatChange((nextUse24Hour) => {
          createClock(nextUse24Hour);
        });

        window.desktopClock.onUpdateToast(({ message, type, persistent }) => {
          showToast(message, type, persistent);
        });

        window.desktopClock.onCountdownStart((values) => {
          startCountdown(values);
        });

        window.desktopClock.onCountdownStop(({ ended = false, remind = false } = {}) => {
          hideCountdown();
          if (ended && remind) {
            playReminderSound();
          }
        });

        scheduleFitWindow();
      }

      init();
    </script>
  </body>
</html>
